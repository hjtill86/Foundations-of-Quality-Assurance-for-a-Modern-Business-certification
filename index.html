<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Enter Access Code</title>
  <style>
    body { font-family: Arial; display:flex; height:100vh; justify-content:center; align-items:center; background:#f5f5f5; }
    .box { background:white; padding:30px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    input { padding:10px; width:200px; }
    button { padding:10px 20px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Enter Security Code</h2>
    <input id="code" type="password" placeholder="Code">
    <button onclick="check()">Enter</button>
    <p id="msg" style="color:red;"></p>
  </div>

  <script>
    function check() {
      const correct = "Certqa10#";
      const entered = document.getElementById("code").value;

      if (entered === correct) {
        window.location.href = "home.html";  // ← FIXED
      } else {
        document.getElementById("msg").textContent = "Incorrect code";
      }
    }
  </script>
</body>
</html>
